name: context-kitchen-sink
deploy: true

build:
  dockerfile: Dockerfile

processes:
  web:
    port: 8091
    command: ./playground -addr :8091
    health:
      path: /api/auth/check
    scaling:
      min: 1
    resources:
      cpu: 200
      memory: 256

secrets:
  - PLAYGROUND_PASSWORD

env:
  PLAYGROUND_PASSWORD: contextdb

endpoints:
  - url: https://playground.slopistry.com
